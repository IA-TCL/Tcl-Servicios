<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>¡Gracias!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Slab:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            background: #09160d;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 75% 55% at 50% 48%, rgba(38,84,55,0.45) 0%, transparent 65%),
                radial-gradient(ellipse 55% 38% at  8% 85%, rgba(20,55,34,0.35) 0%, transparent 55%),
                radial-gradient(ellipse 45% 32% at 92% 12%, rgba(16,48,30,0.3)  0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .bg-dots {
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
            background-size: 26px 26px;
            pointer-events: none; z-index: 0;
        }

        .bg-ring { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
        .bg-ring-1       { width: 760px; height: 760px; top: -300px; left: -280px; border: 1px solid rgba(255,255,255,0.045); }
        .bg-ring-1-inner { width: 560px; height: 560px; top: -200px; left: -180px; border: 1px solid rgba(255,255,255,0.025); }
        .bg-ring-2       { width: 580px; height: 580px; bottom: -200px; right: -200px; border: 1px solid rgba(255,255,255,0.04); }
        .bg-ring-2-inner { width: 380px; height: 380px; bottom: -100px; right: -100px; border: 1px solid rgba(255,255,255,0.025); }

        .bg-watermark {
            position: fixed;
            font-family: 'Roboto Slab', serif;
            font-size: clamp(130px, 22vw, 240px);
            font-weight: 700;
            color: rgba(255,255,255,0.018);
            letter-spacing: -6px;
            bottom: -30px; left: 50%;
            transform: translateX(-50%);
            user-select: none; pointer-events: none; z-index: 0; white-space: nowrap;
        }

        .bg-brand {
            position: fixed;
            top: 26px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px;
            font-size: 10.5px; font-weight: 600;
            letter-spacing: 4px; text-transform: uppercase;
            color: rgba(255,255,255,0.18);
            pointer-events: none; z-index: 3; white-space: nowrap;
        }
        .bg-brand::before,
        .bg-brand::after { content: ''; width: 28px; height: 1px; background: rgba(255,255,255,0.12); }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 44px 48px 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 24px 64px rgba(0,0,0,.28), 0 4px 16px rgba(0,0,0,.12);
            border-top: 4px solid #2A4038;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: slideUp .55s cubic-bezier(.16,1,.3,1) both;
            position: relative; z-index: 1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-img { width: 200px; height: auto; display: block; margin-bottom: 24px; }

        .divider {
            border: none;
            height: 1px;
            width: 100%;
            background: linear-gradient(to right, transparent, #d1d5db, transparent);
            margin-bottom: 32px;
        }

        .icon-wrap {
            width: 68px;
            height: 68px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            animation: scaleIn .45s cubic-bezier(.175,.885,.32,1.275) .35s both,
                       pulse 2.5s ease 1.2s infinite;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(.4); }
            to   { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0   rgba(22,163,74,.25); }
            50%       { box-shadow: 0 0 0 12px rgba(22,163,74,.0);  }
        }

        .icon-wrap svg {
            width: 32px; height: 32px;
            stroke: #16a34a; stroke-width: 2.5;
            fill: none; stroke-linecap: round; stroke-linejoin: round;
            overflow: visible;
        }

        .icon-wrap svg polyline {
            stroke-dasharray: 40;
            stroke-dashoffset: 40;
            animation: drawCheck .5s ease .8s forwards;
        }

        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        h1 {
            font-size: 24px; font-weight: 800; color: #111827;
            margin-bottom: 10px; letter-spacing: -.3px;
            animation: fadeIn .4s ease .5s both;
        }

        p {
            font-size: 14px; color: #6b7280; line-height: 1.7;
            animation: fadeIn .4s ease .65s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-dots"></div>
    <div class="bg-ring bg-ring-1"></div>
    <div class="bg-ring bg-ring-1-inner"></div>
    <div class="bg-ring bg-ring-2"></div>
    <div class="bg-ring bg-ring-2-inner"></div>
    <div class="bg-watermark">TCL</div>
    <div class="bg-brand">TCL Asesores &mdash; Servicios</div>
    <div class="card">
        <img src="/static/logo.png" alt="TCL" class="logo-img">
        <div class="divider"></div>
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>¡Solicitud enviada!</h1>
        <p>Hemos recibido tu solicitud correctamente.<br>Pronto nos pondremos en contacto contigo.</p>
    </div>
</body>
</html>
